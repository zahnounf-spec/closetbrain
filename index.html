<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClosetBrain</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; min-height: 100vh; padding: 2rem 1rem; }
  .app { max-width: 560px; margin: 0 auto; }
  .logo { font-size: 26px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
  .logo span { color: #1D9E75; }
  .sub { font-size: 14px; color: #888; margin-bottom: 2rem; }

  /* Weather bar */
  .weather-bar { display: flex; align-items: center; gap: 10px; background: #fff; border: 0.5px solid #e5e5e5; border-radius: 10px; padding: 10px 14px; margin-bottom: 1.5rem; font-size: 13px; color: #555; }
  .weather-icon { font-size: 20px; }
  .weather-temp { font-weight: 600; color: #1a1a1a; }
  .weather-desc { color: #888; }
  .weather-loading { color: #aaa; font-size: 13px; }

  .section-label { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }

  /* Category tabs */
  .cat-tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .cat-tab { padding: 5px 14px; border-radius: 20px; border: 1px solid #ddd; background: #fff; font-size: 12px; color: #666; cursor: pointer; transition: all 0.15s; }
  .cat-tab.active { background: #1a1a1a; border-color: #1a1a1a; color: #fff; }

  /* Upload grid */
  .upload-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 0.5rem; }
  .upload-slot { aspect-ratio: 3/4; border-radius: 10px; border: 1.5px dashed #ccc; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.15s, background 0.15s; }
  .upload-slot:hover { border-color: #1D9E75; background: #f0fdf8; }
  .upload-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; border-radius: 10px; }
  .plus { font-size: 24px; color: #bbb; }
  .slot-label { font-size: 11px; color: #bbb; margin-top: 4px; }
  .slot-number { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.55); color: #fff; font-size: 11px; font-weight: 600; border-radius: 5px; padding: 1px 6px; z-index: 2; }
  .slot-cat { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.55); color: #fff; font-size: 10px; border-radius: 5px; padding: 1px 6px; z-index: 2; }
  .remove-btn { position: absolute; top: 5px; right: 5px; background: rgba(0,0,0,0.6); border: none; border-radius: 50%; width: 22px; height: 22px; color: #fff; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; }
  .tip { font-size: 12px; color: #aaa; margin-bottom: 1.5rem; }

  /* Occasion */
  .occasion-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .occ-btn { padding: 7px 16px; border-radius: 20px; border: 1px solid #ddd; background: #fff; font-size: 13px; color: #666; cursor: pointer; transition: all 0.15s; }
  .occ-btn:hover { border-color: #1D9E75; }
  .occ-btn.active { background: #E1F5EE; border-color: #1D9E75; color: #0F6E56; font-weight: 600; }

  /* Generate */
  .generate-btn { width: 100%; padding: 14px; background: #1D9E75; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 1.5rem; transition: background 0.15s; }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .generate-btn:not(:disabled):hover { background: #0F6E56; }

  /* Loading */
  .loading { text-align: center; padding: 2.5rem 0; color: #888; font-size: 14px; }
  .spinner { display: inline-block; width: 22px; height: 22px; border: 2.5px solid #ddd; border-top-color: #1D9E75; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error { color: #a32d2d; font-size: 13px; margin-bottom: 1rem; padding: 10px 14px; background: #fff0f0; border-radius: 8px; }

  /* Results */
  .results-header { font-size: 17px; font-weight: 700; color: #1a1a1a; margin-bottom: 1rem; }
  .result-card { background: #fff; border: 0.5px solid #e5e5e5; border-radius: 14px; padding: 1.25rem; margin-bottom: 1.25rem; }
  .outfit-title { font-size: 15px; font-weight: 700; color: #1a1a1a; margin-bottom: 12px; }
  .outfit-photos { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .outfit-photo-wrap { display: flex; flex-direction: column; align-items: center; width: 90px; }
  .outfit-photo-wrap img { width: 90px; height: 120px; object-fit: cover; border-radius: 10px; border: 2px solid #E1F5EE; display: block; }
  .outfit-photo-label { font-size: 10px; color: #888; text-align: center; margin-top: 5px; line-height: 1.3; max-width: 90px; }
  .outfit-item { display: flex; align-items: flex-start; gap: 8px; padding: 3px 0; font-size: 13px; color: #444; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #1D9E75; flex-shrink: 0; margin-top: 5px; }
  .why { margin-top: 12px; padding-top: 12px; border-top: 0.5px solid #eee; font-size: 13px; color: #777; line-height: 1.65; }

  /* Feedback */
  .feedback-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; padding-top: 12px; border-top: 0.5px solid #eee; }
  .feedback-label { font-size: 12px; color: #aaa; flex: 1; }
  .fb-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #ddd; background: #fff; font-size: 13px; cursor: pointer; transition: all 0.15s; }
  .fb-btn:hover { border-color: #1D9E75; }
  .fb-btn.liked { background: #E1F5EE; border-color: #1D9E75; }
  .fb-btn.disliked { background: #fff0f0; border-color: #f5c1c1; }
  .feedback-thanks { font-size: 12px; color: #1D9E75; }

  input[type="file"] { display: none; }
</style>
</head>
<body>
<div class="app">
  <div class="logo">Closet<span>Brain</span></div>
  <p class="sub">Upload je kleding, krijg outfits van AI</p>

  <!-- Weer -->
  <div id="weatherBar" class="weather-bar">
    <span class="weather-loading">Weer ophalen...</span>
  </div>

  <!-- Categorie tabs -->
  <div class="section-label">Categorie</div>
  <div class="cat-tabs" id="catTabs">
    <button class="cat-tab active" data-cat="kleding">👕 Kleding</button>
    <button class="cat-tab" data-cat="schoenen">👟 Schoenen</button>
    <button class="cat-tab" data-cat="accessoires">👜 Accessoires</button>
  </div>

  <div class="section-label">Items (tot 6)</div>
  <div class="upload-grid" id="uploadGrid"></div>
  <p class="tip">Kies een categorie, dan klik op een vakje om te uploaden</p>

  <div class="section-label">Gelegenheid</div>
  <div class="occasion-row" id="occasionRow">
    <button class="occ-btn active" data-val="casual">Casual</button>
    <button class="occ-btn" data-val="werk">Werk</button>
    <button class="occ-btn" data-val="date">Date</button>
    <button class="occ-btn" data-val="feest">Feestje</button>
    <button class="occ-btn" data-val="sport">Sport</button>
  </div>

  <button class="generate-btn" id="generateBtn" disabled>Stel outfits samen</button>
  <div id="output"></div>
</div>

<input type="file" accept="image/*" id="fileInput">

<script>
  const MAX = 6;
  const slots = new Array(MAX).fill(null);
  let occasion = 'casual';
  let targetSlot = null;
  let activeCategory = 'kleding';
  let weatherInfo = '';
  let feedbackData = JSON.parse(localStorage.getItem('cb_feedback') || '[]');

  // === WEER ===
  function getWeatherIcon(code) {
    if (code <= 1) return '☀️';
    if (code <= 3) return '⛅';
    if (code <= 48) return '🌫️';
    if (code <= 67) return '🌧️';
    if (code <= 77) return '❄️';
    if (code <= 82) return '🌦️';
    return '⛈️';
  }

  async function fetchWeather() {
    try {
      const geoRes = await fetch('https://ipapi.co/json/');
      const geo = await geoRes.json();
      const lat = geo.latitude, lon = geo.longitude, city = geo.city;
      const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode&wind_speed_unit=kmh`);
      const w = await wRes.json();
      const temp = Math.round(w.current.temperature_2m);
      const code = w.current.weathercode;
      const icon = getWeatherIcon(code);
      const descs = { 0:'Heldere lucht', 1:'Vrijwel helder', 2:'Gedeeltelijk bewolkt', 3:'Bewolkt', 45:'Mist', 48:'Ijsmist', 51:'Lichte motregen', 61:'Lichte regen', 63:'Matige regen', 65:'Zware regen', 71:'Lichte sneeuw', 80:'Lichte buien', 81:'Matige buien', 95:'Onweer' };
      const desc = descs[code] || 'Wisselvallig';
      weatherInfo = `${temp}°C, ${desc} in ${city}`;
      document.getElementById('weatherBar').innerHTML = `<span class="weather-icon">${icon}</span><span class="weather-temp">${temp}°C</span><span class="weather-desc">${desc} · ${city}</span>`;
    } catch {
      weatherInfo = '';
      document.getElementById('weatherBar').innerHTML = `<span class="weather-desc">Weer niet beschikbaar</span>`;
    }
  }
  fetchWeather();

  // === CATEGORIE ===
  document.getElementById('catTabs').querySelectorAll('.cat-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat;
    });
  });

  // === COMPRESSIE ===
  function compressImage(dataUrl) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const MAX_SIZE = 800;
        let w = img.width, h = img.height;
        if (w > MAX_SIZE || h > MAX_SIZE) {
          if (w > h) { h = Math.round(h * MAX_SIZE / w); w = MAX_SIZE; }
          else { w = Math.round(w * MAX_SIZE / h); h = MAX_SIZE; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = dataUrl;
    });
  }

  // === GRID ===
  function renderGrid() {
    const grid = document.getElementById('uploadGrid');
    grid.innerHTML = '';
    for (let i = 0; i < MAX; i++) {
      const slot = document.createElement('div');
      slot.className = 'upload-slot';
      if (slots[i]) {
        const img = document.createElement('img');
        img.src = slots[i].dataUrl;
        slot.appendChild(img);
        const num = document.createElement('span');
        num.className = 'slot-number';
        num.textContent = i + 1;
        slot.appendChild(num);
        const cat = document.createElement('span');
        cat.className = 'slot-cat';
        cat.textContent = slots[i].category;
        slot.appendChild(cat);
        const rm = document.createElement('button');
        rm.className = 'remove-btn';
        rm.innerHTML = '&#x2715;';
        rm.onclick = (e) => { e.stopPropagation(); slots[i] = null; renderGrid(); updateBtn(); };
        slot.appendChild(rm);
      } else {
        slot.innerHTML = '<span class="plus">+</span><span class="slot-label">item ' + (i+1) + '</span>';
        slot.onclick = () => { targetSlot = i; document.getElementById('fileInput').click(); };
      }
      grid.appendChild(slot);
    }
  }

  function updateBtn() {
    const count = slots.filter(Boolean).length;
    const btn = document.getElementById('generateBtn');
    btn.disabled = count < 1;
    btn.textContent = count > 0 ? `Stel outfits samen (${count} item${count > 1 ? 's' : ''})` : 'Stel outfits samen';
  }

  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file || targetSlot === null) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const compressed = await compressImage(ev.target.result);
      slots[targetSlot] = { dataUrl: compressed, type: 'image/jpeg', category: activeCategory };
      targetSlot = null;
      renderGrid();
      updateBtn();
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  });

  // === OCCASION ===
  document.getElementById('occasionRow').querySelectorAll('.occ-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.occ-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      occasion = btn.dataset.val;
    });
  });

  // === GENERATE ===
  document.getElementById('generateBtn').addEventListener('click', async () => {
    const items = slots.map((s, i) => s ? { ...s, slotIndex: i + 1 } : null).filter(Boolean);
    if (!items.length) return;

    document.getElementById('output').innerHTML = '<div class="loading"><span class="spinner"></span>AI stylist is bezig...</div>';
    document.getElementById('generateBtn').disabled = true;

    const nummers = items.map(it => `Item ${it.slotIndex} (${it.category})`).join(', ');

    // Feedback context voor AI
    const likedOutfits = feedbackData.filter(f => f.liked).slice(-5).map(f => f.description).join('; ');
    const feedbackContext = likedOutfits ? `De gebruiker vond deze combinaties eerder mooi: ${likedOutfits}.` : '';

    const content = [
      {
        type: 'text',
        text: `Ik heb ${items.length} items geüpload: ${nummers}. Maak 3 outfits voor: ${occasion}. ${weatherInfo ? `Het weer vandaag: ${weatherInfo} — houd hier rekening mee.` : ''} ${feedbackContext} Gebruik "item_indices" met de exacte nummers.`
      },
      ...items.map(item => ({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: item.dataUrl.split(',')[1] } }))
    ];

    try {
      const res = await fetch('/api', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1200,
          system: `Je bent ClosetBrain, een persoonlijke AI-stylist. Houd rekening met het weer en de gelegenheid. Combineer ook schoenen en accessoires met kleding als die aanwezig zijn. Antwoord ALLEEN in dit JSON-formaat, geen tekst erbuiten, geen backticks:
{"outfits":[{"titel":"...","item_indices":[1,2],"items":["korte beschrijving item 1","korte beschrijving item 2"],"waarom":"uitleg inclusief weer en gelegenheid"},{"titel":"...","item_indices":[1,3],"items":["...","..."],"waarom":"..."},{"titel":"...","item_indices":[2,3],"items":["...","..."],"waarom":"..."}]}`,
          messages: [{ role: 'user', content }]
        })
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const text = data.content?.filter(b => b.type === 'text').map(b => b.text).join('') || '';
      const parsed = JSON.parse(text.replace(/```json|```/g, '').trim());
      renderResults(parsed.outfits || [], items);
    } catch (err) {
      document.getElementById('output').innerHTML = `<div class="error">Fout: ${err.message}</div>`;
    } finally {
      updateBtn();
    }
  });

  // === RESULTS ===
  function renderResults(outfits, uploadedItems) {
    if (!outfits.length) { document.getElementById('output').innerHTML = '<div class="error">Geen outfits gevonden.</div>'; return; }
    const slotMap = {};
    uploadedItems.forEach(item => { slotMap[item.slotIndex] = item.dataUrl; });

    let html = `<p class="results-header">Jouw outfits voor ${occasion}${weatherInfo ? ' · ' + weatherInfo.split(',')[0] : ''}</p>`;

    outfits.forEach((o, i) => {
      const indices = Array.isArray(o.item_indices) ? o.item_indices : [];
      let photosHtml = '';
      if (indices.length) {
        photosHtml = '<div class="outfit-photos">';
        indices.forEach((idx, pi) => {
          const url = slotMap[idx];
          const label = o.items && o.items[pi] ? o.items[pi].split(' ').slice(0, 4).join(' ') + '…' : `Item ${idx}`;
          if (url) photosHtml += `<div class="outfit-photo-wrap"><img src="${url}" alt="Item ${idx}"><div class="outfit-photo-label">${label}</div></div>`;
        });
        photosHtml += '</div>';
      }
      const itemsHtml = (o.items || []).map(item => `<div class="outfit-item"><span class="dot"></span>${item}</div>`).join('');
      const outfitDesc = o.titel + ': ' + (o.items || []).join(', ');
      const cardId = `outfit-${i}`;

      html += `<div class="result-card" id="${cardId}">
        <div class="outfit-title">Outfit ${i+1}: ${o.titel || ''}</div>
        ${photosHtml}
        ${itemsHtml}
        <div class="why">${o.waarom || ''}</div>
        <div class="feedback-row">
          <span class="feedback-label">Vind je deze combinatie mooi?</span>
          <button class="fb-btn" onclick="giveFeedback('${cardId}', true, '${outfitDesc.replace(/'/g, '')}')">👍 Ja</button>
          <button class="fb-btn" onclick="giveFeedback('${cardId}', false, '${outfitDesc.replace(/'/g, '')}')">👎 Nee</button>
        </div>
      </div>`;
    });

    document.getElementById('output').innerHTML = html;
  }

  // === FEEDBACK ===
  function giveFeedback(cardId, liked, description) {
    feedbackData.push({ liked, description, date: new Date().toISOString() });
    if (feedbackData.length > 20) feedbackData = feedbackData.slice(-20);
    localStorage.setItem('cb_feedback', JSON.stringify(feedbackData));

    const card = document.getElementById(cardId);
    if (card) {
      const row = card.querySelector('.feedback-row');
      row.innerHTML = `<span class="feedback-thanks">${liked ? '💚 Super! AI onthoudt jouw smaak.' : '👌 Bedankt! AI leert wat je niet mooi vindt.'}</span>`;
    }
  }

  renderGrid();
</script>
</body>
</html>
